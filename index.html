<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Ultimate Q4 Playbook — Loyoly</title>
  <script>
    (function () {
      var supported = ["en", "fr", "es"];
      var stored = null;
      try {
        stored = localStorage.getItem("q4-market");
      } catch (e) {
        /* localStorage unavailable (privacy mode) — ignore */
      }
      var lang = (navigator.language || "en").slice(0, 2).toLowerCase();
      var target = supported.indexOf(stored) !== -1 ? stored : (supported.indexOf(lang) !== -1 ? lang : "en");
      window.location.replace("/" + target + "/" + location.hash);
    })();
  </script>
</head>
<body>
  <noscript>
    <p>
      <a href="/en/">English</a> ·
      <a href="/fr/">Français</a> ·
      <a href="/es/">Español</a>
    </p>
  </noscript>
</body>
</html>
